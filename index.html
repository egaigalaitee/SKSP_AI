<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokalbiu Langas</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <main class="page">
      <div class="bg-orb bg-orb-1"></div>
      <div class="bg-orb bg-orb-2"></div>
      <div class="bg-orb bg-orb-3"></div>
      <div class="bg-orb bg-orb-4"></div>
      <div class="bottom-glow"></div>

      <header class="header">
        <a class="logo" href="#" aria-label="Pradinis">
          <img src="./Logotipas.png" alt="Logotipas" class="logo-image" />
        </a>
      </header>

      <section class="chat-panel" aria-label="Pokalbio langas">
        <div class="chat-stage">
          <div id="messages" class="messages"></div>
        </div>
      </section>

      <form class="composer" action="#" method="post">
        <label for="upload" class="upload" aria-label="Prideti failus">
          <img src="./Prideti.png" alt="Prideti faila" class="upload-icon" />
        </label>
        <input id="upload" class="upload-input" type="file" multiple />

        <div class="composer-content">
          <textarea
            id="composer-input"
            class="composer-input"
            placeholder=""
            aria-label="Zinutes tekstas"
            rows="1"
          ></textarea>
          <div id="file-list" class="file-list" aria-live="polite"></div>
        </div>

        <button class="send" type="submit" aria-label="Siusti">
          <img src="./Siusti.png" alt="Siusti" class="send-icon" />
        </button>
      </form>
    </main>

    <script>
      const uploadInput = document.getElementById("upload");
      const fileList = document.getElementById("file-list");
      const composerForm = document.querySelector(".composer");
      const composerInput = document.getElementById("composer-input");
      const messages = document.getElementById("messages");

      uploadInput.addEventListener("change", () => {
        fileList.innerHTML = "";
        Array.from(uploadInput.files || []).forEach((file) => {
          const tag = document.createElement("span");
          tag.className = "file-tag";
          tag.textContent = file.name;
          fileList.appendChild(tag);
        });
      });

      const resizeComposer = () => {
        composerInput.style.height = "auto";
        composerInput.style.height = `${composerInput.scrollHeight}px`;
      };

      composerInput.addEventListener("input", resizeComposer);
      composerInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          composerForm.requestSubmit();
        }
      });
      resizeComposer();

      composerForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const text = composerInput.value.trim();
        if (!text) return;

        const question = document.createElement("article");
        question.className = "message-row message-row-question";
        question.innerHTML = `
          <div class="message-bubble message-bubble-question">
            <p class="message-text"></p>
          </div>
        `;
        question.querySelector(".message-text").textContent = text;
        messages.appendChild(question);

        const answer = document.createElement("article");
        answer.className = "message-row message-row-answer";
        answer.innerHTML = `
          <div class="message-bubble message-bubble-answer">
            <p class="message-text">DI atsakymas atsiranda cia po tavo zinutes issiuntimo.</p>
          </div>
        `;
        messages.appendChild(answer);

        composerInput.value = "";
        resizeComposer();
        messages.scrollTop = messages.scrollHeight;
      });
    </script>
  </body>
</html>
