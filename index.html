<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokalbiu Langas</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <main class="page">
      <div class="bg-orb bg-orb-1"></div>
      <div class="bg-orb bg-orb-2"></div>
      <div class="bg-orb bg-orb-3"></div>
      <div class="bg-orb bg-orb-4"></div>
      <div class="bottom-glow"></div>

      <header class="header">
        <a class="logo" href="#" aria-label="Pradinis">
          <span class="logo-line logo-line-top-left"></span>
          <span class="logo-line logo-line-top-right"></span>
          <span class="logo-line logo-line-middle-left"></span>
          <span class="logo-line logo-line-middle-right"></span>
          <span class="logo-line logo-line-bottom-left"></span>
          <span class="logo-line logo-line-bottom-right"></span>
          <span class="logo-line logo-line-center"></span>
        </a>
      </header>

      <section class="chat-panel" aria-label="Pokalbio langas">
        <div class="chat-stage"></div>
      </section>

      <form class="composer" action="#" method="post">
        <label for="upload" class="upload" aria-label="Prideti failus">+</label>
        <input id="upload" class="upload-input" type="file" multiple />

        <div class="composer-content">
          <input
            class="composer-input"
            type="text"
            placeholder="Tekstas"
            aria-label="Zinutes tekstas"
          />
          <div id="file-list" class="file-list" aria-live="polite"></div>
        </div>

        <button class="send" type="submit" aria-label="Siusti">
          <span class="send-arrow"></span>
        </button>
      </form>
    </main>

    <script>
      const uploadInput = document.getElementById("upload");
      const fileList = document.getElementById("file-list");

      uploadInput.addEventListener("change", () => {
        fileList.innerHTML = "";
        Array.from(uploadInput.files || []).forEach((file) => {
          const tag = document.createElement("span");
          tag.className = "file-tag";
          tag.textContent = file.name;
          fileList.appendChild(tag);
        });
      });
    </script>
  </body>
</html>
