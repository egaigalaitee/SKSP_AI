<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokalbiu Langas</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <main class="page">
      <div class="bg-orb bg-orb-1"></div>
      <div class="bg-orb bg-orb-2"></div>
      <div class="bg-orb bg-orb-3"></div>
      <div class="bg-orb bg-orb-4"></div>
      <div class="bottom-glow"></div>

      <header class="header">
        <a class="logo" href="#" aria-label="Pradinis">
          <img src="./Logotipas.png" alt="Logotipas" class="logo-image" />
        </a>
      </header>

      <section class="chat-panel" aria-label="Pokalbio langas">
        <div class="chat-stage">
          <div id="messages" class="messages"></div>
        </div>
      </section>

      <form class="composer" action="#" method="post">
        <label for="upload" class="upload" aria-label="Prideti failus">
          <img src="./Pridėti.png" alt="Prideti faila" class="upload-icon" />
        </label>
        <input
          id="upload"
          class="upload-input"
          type="file"
          multiple
          accept=".pdf,.doc,.docx,.dwg,.dxf,.png,.jpg,.jpeg,.tif,.tiff,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/png,image/jpeg,image/tiff,image/tif"
        />

        <div class="composer-content">
          <textarea
            id="composer-input"
            class="composer-input"
            placeholder=""
            aria-label="Zinutes tekstas"
            rows="1"
          ></textarea>
          <div id="file-list" class="file-list" aria-live="polite"></div>
        </div>

        <button class="send" type="submit" aria-label="Siusti">
          <img src="./Siųsti.png" alt="Siusti" class="send-icon" />
        </button>
      </form>
    </main>

    <script>
      const uploadInput = document.getElementById("upload");
      const fileList = document.getElementById("file-list");
      const composerForm = document.querySelector(".composer");
      const composerInput = document.getElementById("composer-input");
      const messages = document.getElementById("messages");
      let attachedFiles = [];

      const renderSelectedFiles = () => {
        fileList.innerHTML = "";
        attachedFiles.forEach((file) => {
          const tag = document.createElement("span");
          tag.className = "file-tag";
          tag.textContent = file.name;
          fileList.appendChild(tag);
        });
      };

      uploadInput.addEventListener("change", () => {
        attachedFiles = Array.from(uploadInput.files || []);
        renderSelectedFiles();
      });

      const escapeHtml = (value) =>
        value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");

      const formatFileSize = (size) => {
        if (size < 1024) return `${size} B`;
        if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
        return `${(size / (1024 * 1024)).toFixed(1)} MB`;
      };

      const getFileKindLabel = (file) => {
        const extension = file.name.split(".").pop()?.toLowerCase() || "";

        if (extension === "pdf") return "PDF dokumentas";
        if (extension === "doc" || extension === "docx") return "Word dokumentas";
        if (extension === "dwg" || extension === "dxf") return "AutoCAD brėžinys";
        if (extension === "png") return "PNG paveikslėlis";
        if (extension === "jpg" || extension === "jpeg") return "JPG paveikslėlis";
        if (extension === "tif" || extension === "tiff") return "TIFF paveikslėlis";
        if (file.type.startsWith("image/")) return "Paveikslėlis";
        return "Failas";
      };

      const buildAttachmentMarkup = (files) => {
        if (!files.length) return "";

        const items = files
          .map(
            (file) => `
              <span class="message-file">
                <span class="message-file-name">${escapeHtml(file.name)}</span>
                <span class="message-file-meta">${formatFileSize(file.size)}</span>
              </span>
            `
          )
          .join("");

        return `<div class="message-files">${items}</div>`;
      };

      const readFilePreview = (file) =>
        new Promise((resolve) => {
          if (
            file.type.startsWith("text/") ||
            /\.(txt|md|json|csv|js|ts|html|css)$/i.test(file.name)
          ) {
            const reader = new FileReader();
            reader.onload = () => {
              const text = String(reader.result || "").trim();
              const snippet = text.slice(0, 700);
              resolve({
                name: file.name,
                type: file.type || "text",
                size: file.size,
                summary: snippet
                  ? `Radau tekstinį failą. Pirmos eilutės: ${snippet}`
                  : "Failas tuščias arba nepavyko nuskaityti turinio.",
              });
            };
            reader.onerror = () =>
              resolve({
                name: file.name,
                type: file.type || "unknown",
                size: file.size,
                summary: "Nepavyko nuskaityti šio failo turinio.",
              });
            reader.readAsText(file);
            return;
          }

          if (file.type.startsWith("image/")) {
            resolve({
              name: file.name,
              type: file.type,
              size: file.size,
              summary: `${getFileKindLabel(file)} paruoštas analizei. Dydis: ${formatFileSize(file.size)}.`,
            });
            return;
          }

          resolve({
            name: file.name,
            type: file.type || "unknown",
            size: file.size,
            summary: `${getFileKindLabel(file)} pridėtas. Tipas: ${file.type || "nežinomas"}, dydis: ${formatFileSize(file.size)}.`,
          });
        });

      const buildAiResponse = async (text, files) => {
        if (!files.length) {
          return "Gavau tavo žinutę. Jei prisegsi failą, galėsiu parodyti jo santrauką šiame pokalbyje.";
        }

        const previews = await Promise.all(files.map(readFilePreview));
        const fileSummary = previews
          .map((file, index) => `${index + 1}. ${file.name}: ${file.summary}`)
          .join("\n\n");

        return `Gavau tavo žinutę: "${text}".\n\nPridėtų failų analizė:\n\n${fileSummary}`;
      };

      const resizeComposer = () => {
        composerInput.style.height = "auto";
        composerInput.style.height = `${composerInput.scrollHeight}px`;
      };

      composerInput.addEventListener("input", resizeComposer);
      composerInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          composerForm.requestSubmit();
        }
      });
      resizeComposer();

      composerForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const text = composerInput.value.trim();
        if (!text && !attachedFiles.length) return;
        const filesForMessage = [...attachedFiles];

        const question = document.createElement("article");
        question.className = "message-row message-row-question";
        question.innerHTML = `
          <div class="message-bubble message-bubble-question">
            ${text ? '<p class="message-text"></p>' : ""}
            ${buildAttachmentMarkup(filesForMessage)}
          </div>
        `;
        if (text) {
          question.querySelector(".message-text").textContent = text;
        }
        messages.appendChild(question);

        const answer = document.createElement("article");
        answer.className = "message-row message-row-answer";
        messages.appendChild(answer);

        composerInput.value = "";
        attachedFiles = [];
        uploadInput.value = "";
        renderSelectedFiles();
        resizeComposer();
        messages.scrollTop = messages.scrollHeight;

        buildAiResponse(text || "Prisegti failai", filesForMessage).then((responseText) => {
          answer.innerHTML = `
            <div class="message-bubble message-bubble-answer">
              <p class="message-text"></p>
            </div>
          `;
          answer.querySelector(".message-text").textContent = responseText;
          messages.scrollTop = messages.scrollHeight;
        });
      });
    </script>
  </body>
</html>
