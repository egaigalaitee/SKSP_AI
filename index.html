<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokalbiu Langas</title>
    <link rel="stylesheet" href="./chat-ui.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="blur blur-one"></div>
      <div class="blur blur-two"></div>
      <div class="blur blur-three"></div>
      <div class="blur blur-four"></div>
      <div class="blur blur-five"></div>
      <div class="gradient-orb gradient-orb-one"></div>
      <div class="gradient-orb gradient-orb-two"></div>

      <header class="topbar">
        <a href="#" class="brand-mark" aria-label="Pagrindinis">
          <img src="./Logotipas.png" alt="Logotipas" class="brand-image" />
        </a>

        <button class="cta-button" type="button">PRADĖTI NAUDOTIS</button>
      </header>

      <section class="chat-card">
        <div class="chat-thread">
          <article class="message-row message-row--right">
            <div class="message-bubble message-bubble--light">
              Sveiki, noriu susikurti pokalbių langą su tokiu pačiu stiliumi,
              spalvomis, fontu ir teksto dydžiu kaip makete.
            </div>
          </article>

          <article class="message-row message-row--left">
            <div class="message-bubble message-bubble--strong">
              Žinoma. Kvadratėlius pakeitėme į pokalbių burbulus, išlaikėme
              mėlyną spalvinę gamą, `Helvetica` stilių ir 15px teksto dydį.
            </div>
          </article>
        </div>

        <form class="composer" action="#" method="post">
          <label for="file-upload" class="upload-button" aria-label="Pridėti failus">
            +
          </label>
          <input id="file-upload" class="file-input" type="file" multiple />

          <div class="composer-content">
            <input
              class="message-input"
              type="text"
              placeholder="Tekstas"
              aria-label="Žinutės tekstas"
            />
            <div id="file-list" class="file-list" aria-live="polite"></div>
          </div>

          <button class="send-button" type="submit" aria-label="Siųsti">
            <span></span>
          </button>
        </form>
      </section>
    </main>

    <script>
      const fileInput = document.getElementById("file-upload");
      const fileList = document.getElementById("file-list");

      fileInput.addEventListener("change", () => {
        const files = Array.from(fileInput.files || []);
        fileList.innerHTML = "";

        files.forEach((file) => {
          const chip = document.createElement("span");
          chip.className = "file-chip";
          chip.textContent = file.name;
          fileList.appendChild(chip);
        });
      });
    </script>
  </body>
</html>
